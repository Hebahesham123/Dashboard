<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Submissions Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            <polyline points="9 22 9 12 15 12 15 22" />
          </svg>
        </div>
        <span class="brand-text">Dashboard</span>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" data-view="overview">
          <svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Overview
        </a>
        <a href="#" class="nav-item" data-view="submissions">
          <svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          Submissions
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="realtime-badge" id="realtimeBadge">
          <span class="pulse"></span>
          Live
        </div>
      </div>
    </aside>

    <main class="main">
      <header class="header">
        <div class="header-left">
          <h1 class="page-title" id="pageTitle">Overview</h1>
          <p class="page-subtitle" id="pageSubtitle">Monitor form submissions in real time</p>
        </div>
        <div class="header-actions">
          <div class="search-wrap">
            <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="search" id="searchInput" class="search-input" placeholder="Search submissions..." autocomplete="off" />
          </div>
          <button type="button" class="btn btn-ghost" id="refreshBtn" title="Refresh">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          </button>
        </div>
      </header>

      <div class="content">
        <section class="stats-grid" id="statsGrid">
          <div class="stat-card">
            <div class="stat-icon total">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            </div>
            <div class="stat-content">
              <span class="stat-value" id="statTotal">—</span>
              <span class="stat-label">Total submissions</span>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon today">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            </div>
            <div class="stat-content">
              <span class="stat-value" id="statToday">—</span>
              <span class="stat-label">Today</span>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon week">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
            </div>
            <div class="stat-content">
              <span class="stat-value" id="statWeek">—</span>
              <span class="stat-label">This week</span>
            </div>
          </div>
        </section>

        <section class="table-section">
          <div class="table-header">
            <h2 class="table-title">Recent submissions</h2>
            <div class="table-controls">
              <select id="sortSelect" class="select" aria-label="Sort by">
                <option value="created_at_desc">Newest first</option>
                <option value="created_at_asc">Oldest first</option>
              </select>
              <select id="limitSelect" class="select" aria-label="Rows per page">
                <option value="25">25 per page</option>
                <option value="50">50 per page</option>
                <option value="100">100 per page</option>
              </select>
            </div>
          </div>
          <div class="table-wrap">
            <div class="loading-state" id="loadingState">
              <div class="spinner"></div>
              <p>Loading submissions…</p>
            </div>
            <div class="empty-state" id="emptyState" hidden>
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
              <p>No submissions yet</p>
              <span>New entries will appear here when someone submits the form.</span>
            </div>
            <table class="data-table" id="dataTable" hidden>
              <thead id="tableHead">
                <tr></tr>
              </thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>
          <div class="table-footer" id="tableFooter" hidden>
            <span class="table-count" id="tableCount"></span>
          </div>
        </section>
      </div>
    </main>
  </div>

  <div class="toast-container" id="toastContainer" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
